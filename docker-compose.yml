# docker-compose.yml
version: '3.8'

# Carregar variáveis de ambiente do arquivo .env (padrão do Docker Compose)
services:
  download-car-download:
    build:
      context: .
      dockerfile: Dockerfile.download-car
      args:
        BASE_IMAGE: ${BASE_IMAGE:-download-car-pro:latest}
    volumes:
      - .:/download-car
    entrypoint: ./entrypoint.download.sh
    environment:
      - STATE
      - POLYGON
      - FOLDER
      - TRIES
      - DEBUG
      - TIMEOUT
      - MAX_RETRIES

  download-car-api:
    build:
      context: .
      dockerfile: Dockerfile.api
      args:
        BASE_IMAGE: ${BASE_IMAGE:-download-car-pro:latest}
    volumes:
      - .:/download-car
    ports:
      - "8000:8000"

    environment:
      - API_URL
      - CORS_ALLOW_ORIGINS
      - CORS_ALLOW_CREDENTIALS
      - CORS_ALLOW_METHODS
      - CORS_ALLOW_HEADERS
      - MAPBIOMAS_URL
      - IBGE_URL
      - DB_HOST
      - DB_PORT
      - DB_NAME
      - DB_USER
      - DB_PASSWORD
      - DB_SCHEMA
      - DB_POOL_SIZE
      - DB_TIMEOUT

  nginx:
    build:
      context: .
      dockerfile: Dockerfile.nginx
    ports:
      - "8787:80"
    volumes:
      - ./nginx.conf.template:/etc/nginx/conf.d/default.conf.template:ro
      - ./index.html:/usr/share/nginx/html/index.html:rw
      - ./assets:/usr/share/nginx/html/assets:ro
    entrypoint: ["/entrypoint.sh"]
    depends_on:
      - download-car-api
      - download-car-download
    environment:
      # Todas as variáveis são carregadas automaticamente do arquivo .env
      - API_ENDPOINT_URL
      - DEFAULT_POLYGON
      - DEFAULT_TIMEOUT
      - TIMEOUT_INCREMENT
      - MIN_TIMEOUT
      - MAX_TIMEOUT
      - STATE_TIMEOUT_AC
      - STATE_TIMEOUT_AL
      - STATE_TIMEOUT_AM
      - STATE_TIMEOUT_AP
      - STATE_TIMEOUT_BA
      - STATE_TIMEOUT_CE
      - STATE_TIMEOUT_DF
      - STATE_TIMEOUT_ES
      - STATE_TIMEOUT_GO
      - STATE_TIMEOUT_MA
      - STATE_TIMEOUT_MG
      - STATE_TIMEOUT_MS
      - STATE_TIMEOUT_MT
      - STATE_TIMEOUT_PA
      - STATE_TIMEOUT_PB
      - STATE_TIMEOUT_PE
      - STATE_TIMEOUT_PI
      - STATE_TIMEOUT_PR
      - STATE_TIMEOUT_RJ
      - STATE_TIMEOUT_RN
      - STATE_TIMEOUT_RO
      - STATE_TIMEOUT_RR
      - STATE_TIMEOUT_RS
      - STATE_TIMEOUT_SC
      - STATE_TIMEOUT_SE
      - STATE_TIMEOUT_SP
      - STATE_TIMEOUT_TO
      - API_HOST
      - API_PORT
      - API_PATH
      - NETWORK_TIMEOUT
      - MAX_RETRIES
      - CORS_ALLOW_ORIGINS
      - CORS_ALLOW_CREDENTIALS
      - CORS_ALLOW_METHODS
      - CORS_ALLOW_HEADERS


